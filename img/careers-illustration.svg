<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Background circle -->
  <circle cx="250" cy="200" r="160" fill="#FF6B35" opacity="0.03"/>
  
  <!-- Rocket -->
  <g transform="translate(200, 80)">
    <path d="M50 120 L50 60 Q50 20 70 10 Q90 0 100 10 Q120 20 100 60 L100 120 Z" fill="#FF6B35" opacity="0.3"/>
    <rect x="60" y="70" width="30" height="40" rx="5" fill="#FFB347" opacity="0.3"/>
    <circle cx="75" cy="85" r="8" fill="#ffffff" opacity="0.2"/>
    <!-- Flames -->
    <path d="M55 120 Q65 145 75 130 Q85 145 95 120" fill="#FF6B35" opacity="0.4"/>
    <path d="M60 125 Q70 140 75 133 Q80 140 90 125" fill="#FFB347" opacity="0.3"/>
  </g>
  
  <!-- Person 1 with laptop -->
  <circle cx="130" cy="250" r="22" fill="#FF6B35" opacity="0.25"/>
  <rect x="112" y="275" width="36" height="45" rx="12" fill="#FF6B35" opacity="0.2"/>
  <rect x="105" y="295" width="50" height="30" rx="3" fill="#2d2d2d" opacity="0.3"/>
  <rect x="110" y="300" width="40" height="20" rx="2" fill="#FF6B35" opacity="0.1"/>
  
  <!-- Person 2 standing -->
  <circle cx="350" cy="240" r="25" fill="#FFB347" opacity="0.25"/>
  <rect x="330" y="268" width="40" height="55" rx="14" fill="#FFB347" opacity="0.2"/>
  
  <!-- Stars/achievements -->
  <g transform="translate(380, 120)">
    <polygon points="20,0 25,15 40,15 28,24 32,38 20,30 8,38 12,24 0,15 15,15" fill="#FF6B35" opacity="0.3"/>
  </g>
  <g transform="translate(80, 150)" >
    <polygon points="15,0 19,11 30,11 21,18 24,29 15,22 6,29 9,18 0,11 11,11" fill="#FFB347" opacity="0.25"/>
  </g>
  
  <!-- Growth chart -->
  <g transform="translate(300, 300)">
    <line x1="0" y1="60" x2="100" y2="60" stroke="#FF6B35" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="60" x2="0" y2="0" stroke="#FF6B35" stroke-width="1.5" opacity="0.3"/>
    <polyline points="10,50 30,40 50,30 70,15 90,5" stroke="#FF6B35" stroke-width="2.5" fill="none" opacity="0.5"/>
    <circle cx="90" cy="5" r="4" fill="#FF6B35" opacity="0.6"/>
  </g>
  
  <!-- Floating dots -->
  <circle cx="450" cy="80" r="6" fill="#FF6B35" opacity="0.15"/>
  <circle cx="60" cy="100" r="4" fill="#FFB347" opacity="0.2"/>
  <circle cx="440" cy="320" r="5" fill="#FF8C5A" opacity="0.15"/>
  <circle cx="50" cy="340" r="7" fill="#FF6B35" opacity="0.1"/>
</svg>