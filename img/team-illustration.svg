<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Background shapes -->
  <circle cx="250" cy="200" r="150" fill="#FF6B35" opacity="0.05"/>
  <circle cx="250" cy="200" r="120" fill="#FF6B35" opacity="0.05"/>
  
  <!-- Person 1 (left) -->
  <circle cx="150" cy="180" r="30" fill="#FF8C5A" opacity="0.3"/>
  <rect x="130" y="215" width="40" height="60" rx="15" fill="#FF8C5A" opacity="0.25"/>
  
  <!-- Person 2 (center) -->
  <circle cx="250" cy="160" r="35" fill="#FF6B35" opacity="0.4"/>
  <rect x="227" y="200" width="46" height="70" rx="18" fill="#FF6B35" opacity="0.3"/>
  
  <!-- Person 3 (right) -->
  <circle cx="350" cy="180" r="30" fill="#FFB347" opacity="0.3"/>
  <rect x="330" y="215" width="40" height="60" rx="15" fill="#FFB347" opacity="0.25"/>
  
  <!-- Connection lines -->
  <line x1="175" y1="190" x2="220" y2="175" stroke="#FF6B35" stroke-width="1.5" opacity="0.3" stroke-dasharray="5,5"/>
  <line x1="280" y1="175" x2="325" y2="190" stroke="#FF6B35" stroke-width="1.5" opacity="0.3" stroke-dasharray="5,5"/>
  <line x1="170" y1="200" x2="330" y2="200" stroke="#FF6B35" stroke-width="1" opacity="0.15" stroke-dasharray="3,3"/>
  
  <!-- Lightbulb above center -->
  <ellipse cx="250" cy="110" rx="15" ry="18" stroke="#FF6B35" stroke-width="2" fill="none" opacity="0.5"/>
  <rect x="245" y="128" width="10" height="8" rx="2" fill="#FF6B35" opacity="0.5"/>
  <line x1="250" y1="85" x2="250" y2="92" stroke="#FFB347" stroke-width="2" opacity="0.4"/>
  <line x1="230" y1="95" x2="235" y2="100" stroke="#FFB347" stroke-width="2" opacity="0.4"/>
  <line x1="270" y1="95" x2="265" y2="100" stroke="#FFB347" stroke-width="2" opacity="0.4"/>
  
  <!-- Chat bubbles -->
  <rect x="80" y="130" width="50" height="30" rx="10" fill="#FF6B35" opacity="0.15"/>
  <rect x="370" y="130" width="50" height="30" rx="10" fill="#FFB347" opacity="0.15"/>
  
  <!-- Dots decoration -->
  <circle cx="100" cy="300" r="5" fill="#FF6B35" opacity="0.2"/>
  <circle cx="120" cy="320" r="3" fill="#FFB347" opacity="0.15"/>
  <circle cx="400" cy="300" r="5" fill="#FF8C5A" opacity="0.2"/>
  <circle cx="380" cy="320" r="3" fill="#FF6B35" opacity="0.15"/>
</svg>