<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <rect x="80" y="100" width="340" height="240" rx="20" fill="#1a1a1a" stroke="#FF6B35" stroke-width="2"/>
  <rect x="100" y="130" width="300" height="180" rx="5" fill="#2d2d2d"/>
  <!-- Code lines -->
  <rect x="120" y="150" width="80" height="8" rx="4" fill="#FF6B35" opacity="0.8"/>
  <rect x="210" y="150" width="50" height="8" rx="4" fill="#FFB347" opacity="0.6"/>
  <rect x="140" y="170" width="120" height="8" rx="4" fill="#FF8C5A" opacity="0.5"/>
  <rect x="270" y="170" width="60" height="8" rx="4" fill="#ffffff" opacity="0.3"/>
  <rect x="140" y="190" width="90" height="8" rx="4" fill="#FFB347" opacity="0.7"/>
  <rect x="240" y="190" width="80" height="8" rx="4" fill="#FF6B35" opacity="0.4"/>
  <rect x="120" y="210" width="60" height="8" rx="4" fill="#ffffff" opacity="0.3"/>
  <rect x="190" y="210" width="100" height="8" rx="4" fill="#FF8C5A" opacity="0.6"/>
  <rect x="140" y="230" width="140" height="8" rx="4" fill="#FFB347" opacity="0.5"/>
  <rect x="120" y="250" width="70" height="8" rx="4" fill="#FF6B35" opacity="0.7"/>
  <rect x="200" y="250" width="90" height="8" rx="4" fill="#ffffff" opacity="0.2"/>
  <rect x="140" y="270" width="110" height="8" rx="4" fill="#FF8C5A" opacity="0.4"/>
  <rect x="260" y="270" width="50" height="8" rx="4" fill="#FFB347" opacity="0.6"/>
  <!-- Screen glow -->
  <ellipse cx="250" cy="350" rx="120" ry="15" fill="#FF6B35" opacity="0.1"/>
  <!-- Floating elements -->
  <circle cx="420" cy="140" r="25" fill="#FF6B35" opacity="0.15"/>
  <circle cx="60" cy="250" r="18" fill="#FFB347" opacity="0.12"/>
  <circle cx="440" cy="280" r="12" fill="#FF8C5A" opacity="0.2"/>
  <!-- Gear icon -->
  <g transform="translate(400, 80)">
    <circle cx="20" cy="20" r="15" stroke="#FF6B35" stroke-width="2" fill="none" opacity="0.6"/>
    <circle cx="20" cy="20" r="6" fill="#FF6B35" opacity="0.6"/>
  </g>
  <!-- Brackets -->
  <text x="70" y="380" font-size="40" fill="#FF6B35" opacity="0.3" font-family="monospace">&lt;/&gt;</text>
  <text x="370" y="400" font-size="30" fill="#FFB347" opacity="0.2" font-family="monospace">{}</text>
  <!-- Person silhouette -->
  <circle cx="250" cy="400" r="20" fill="#FF6B35" opacity="0.2"/>
  <rect x="235" y="420" width="30" height="40" rx="10" fill="#FF6B35" opacity="0.15"/>
</svg>