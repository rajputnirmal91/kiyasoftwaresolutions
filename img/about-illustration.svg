<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Desk -->
  <rect x="100" y="280" width="300" height="8" rx="4" fill="#FF6B35" opacity="0.3"/>
  <rect x="130" y="288" width="8" height="60" fill="#FF6B35" opacity="0.2"/>
  <rect x="362" y="288" width="8" height="60" fill="#FF6B35" opacity="0.2"/>
  
  <!-- Monitor -->
  <rect x="160" y="150" width="180" height="120" rx="10" fill="#1a1a1a" stroke="#FF6B35" stroke-width="2" opacity="0.8"/>
  <rect x="170" y="160" width="160" height="95" rx="3" fill="#2d2d2d"/>
  <rect x="235" y="270" width="30" height="12" fill="#FF6B35" opacity="0.3"/>
  <rect x="215" y="278" width="70" height="4" rx="2" fill="#FF6B35" opacity="0.2"/>
  
  <!-- Code on screen -->
  <rect x="185" y="175" width="60" height="6" rx="3" fill="#FF6B35" opacity="0.7"/>
  <rect x="185" y="188" width="100" height="6" rx="3" fill="#FFB347" opacity="0.5"/>
  <rect x="195" y="201" width="80" height="6" rx="3" fill="#FF8C5A" opacity="0.4"/>
  <rect x="195" y="214" width="60" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
  <rect x="185" y="227" width="90" height="6" rx="3" fill="#FF6B35" opacity="0.5"/>
  <rect x="185" y="240" width="40" height="6" rx="3" fill="#FFB347" opacity="0.6"/>
  
  <!-- Coffee cup -->
  <rect x="360" y="255" width="25" height="25" rx="3" fill="#FF6B35" opacity="0.2"/>
  <path d="M385 260 Q395 267 385 275" stroke="#FF6B35" stroke-width="1.5" fill="none" opacity="0.3"/>
  
  <!-- Plant -->
  <rect x="105" y="250" width="15" height="30" rx="3" fill="#FF6B35" opacity="0.15"/>
  <circle cx="112" cy="240" r="15" fill="#FF6B35" opacity="0.12"/>
  <circle cx="105" cy="235" r="10" fill="#FFB347" opacity="0.1"/>
  
  <!-- Floating elements -->
  <circle cx="420" cy="100" r="20" fill="#FF6B35" opacity="0.1"/>
  <circle cx="80" cy="120" r="15" fill="#FFB347" opacity="0.08"/>
  <rect x="400" cy="200" width="30" height="30" rx="5" fill="#FF8C5A" opacity="0.08" transform="rotate(15 415 215)"/>
  
  <!-- Person -->
  <circle cx="70" cy="220" r="20" fill="#FF6B35" opacity="0.2"/>
  <rect x="55" y="242" width="30" height="50" rx="12" fill="#FF6B35" opacity="0.15"/>
  
  <!-- WiFi signal -->
  <g transform="translate(430, 150)" opacity="0.3">
    <path d="M10 25 Q10 15 20 15 Q30 15 30 25" stroke="#FF6B35" stroke-width="2" fill="none"/>
    <path d="M5 20 Q5 8 20 8 Q35 8 35 20" stroke="#FF6B35" stroke-width="2" fill="none"/>
    <circle cx="20" cy="28" r="3" fill="#FF6B35"/>
  </g>
</svg>